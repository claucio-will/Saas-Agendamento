name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: agendamento
          POSTGRES_PASSWORD: agendamento
          POSTGRES_DB: agendamento
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U agendamento -d agendamento"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      NODE_ENV: test
      # Runtime/testes conectam como papel não-superusuário (RLS aplicado).
      DATABASE_URL: postgresql://app_user:app@localhost:5432/agendamento?schema=public
      # Migrações conectam como o papel privilegiado (dono do banco).
      DIRECT_DATABASE_URL: postgresql://agendamento:agendamento@localhost:5432/agendamento?schema=public
      REDIS_URL: redis://localhost:6379
      WEB_ORIGIN: http://localhost:3000
      JWT_ACCESS_SECRET: ci-access-secret-ci-access-secret
      JWT_REFRESH_SECRET: ci-refresh-secret-ci-refresh-secret

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Instalar dependências
        run: npm ci

      - name: Gerar Prisma Client
        run: npm run db:generate --workspace backend

      - name: Build (shared + apps)
        run: npm run build

      - name: Lint
        run: npm run lint

      - name: Type-check
        run: npm run check-types

      - name: Aplicar migrações (com RLS)
        run: npm run db:deploy --workspace backend

      - name: Testes unitários
        run: npm test

      - name: Teste de isolamento multi-tenant (RLS)
        run: npm run test:e2e --workspace backend
